<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FileConvert</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Syne:wght@400..800&display=swap" rel="stylesheet">
  <script>
    (function () {
      var theme = localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.classList.add(theme);
    })();
  </script>
</head>

<body>
  <div id="splash" style="

  ">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" style="width:72px;height:72px;">
      <rect x="6" y="10" width="24" height="30" rx="3" fill="#a78bfa" opacity="0.3"/>
      <rect x="10" y="6" width="24" height="30" rx="3" fill="#7c3aed" opacity="0.5"/>
      <rect x="14" y="2" width="24" height="30" rx="3" fill="#7c3aed"/>
      <path d="M32 2 L38 8 L32 8 Z" fill="#4c1d95"/>
      <path d="M32 2 L38 8 H32 V2Z" fill="#a78bfa" opacity="0.5"/>
      <rect x="17" y="12" width="18" height="13" rx="1.5" fill="#ede9fe"/>
